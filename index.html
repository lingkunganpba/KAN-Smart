<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAN Asesor Scheduler - Production v5.0</title>
    <!-- Tailwind CSS untuk Interface yang Ringan & Responsive -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Client resmi via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
        }
        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
            background-color: #fff;
            border-bottom: 1px solid #d4d4d4;
        }
        .autocomplete-items div:hover {
            background-color: #e9e9e9;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- 1. HALAMAN LOGIN (Ditampilkan Pertama Kali) -->
    <div id="login-page" class="flex min-h-screen items-center justify-center bg-slate-900 px-4">
        <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Sistem Penjadwalan Asesor</h2>
                <p class="text-sm text-gray-500">Komite Akreditasi Nasional (KAN)</p>
            </div>
            <div id="login-error" class="hidden mb-4 rounded bg-red-100 p-3 text-sm text-red-700"></div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Username PIC</label>
                    <input type="text" id="login-username" required class="mt-1 w-full rounded border border-gray-300 p-2 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Password</label>
                    <input type="password" id="login-password" required class="mt-1 w-full rounded border border-gray-300 p-2 focus:border-blue-500 focus:outline-none">
                </div>
                <button type="submit" id="btn-login" class="w-full rounded bg-blue-600 p-2.5 font-semibold text-white hover:bg-blue-700 transition">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <!-- 2. HALAMAN UTAMA APLIKASI (Disembunyikan Sebelum Login) -->
    <div id="main-app" class="hidden">
        <!-- Navbar -->
        <nav class="bg-blue-900 px-6 py-4 text-white flex flex-wrap justify-between items-center shadow-md">
            <div>
                <h1 class="text-xl font-bold">KAN SCHEDULER</h1>
                <p class="text-xs text-blue-200" id="user-info-display">Loading user...</p>
            </div>
            <button onclick="logout()" class="rounded bg-red-600 px-4 py-2 text-sm font-semibold hover:bg-red-700 transition">Keluar</button>
        </nav>

        <div class="mx-auto max-w-7xl p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- PANEL KIRI: FORM INPUT JADWAL (Bisa diakses Admin & Staff) -->
            <div class="lg:col-span-1 space-y-6">
                <div class="rounded-lg bg-white p-6 shadow">
                    <h3 class="text-lg font-bold border-b pb-2 mb-4 text-slate-800">Input Penjadwalan Baru</h3>
                    <form id="schedule-form" class="space-y-4">
                        <!-- Pencarian LPK Dinamis -->
                        <div class="relative">
                            <label class="block text-sm font-semibold text-gray-700">Cari LPK / Laboratorium</label>
                            <input type="text" id="search-lpk" placeholder="Ketik nama laboratorium..." required autocomplete="off" class="mt-1 w-full rounded border border-gray-300 p-2 focus:outline-none focus:border-blue-500">
                            <input type="hidden" id="selected-no-lpk">
                            <input type="hidden" id="selected-nama-lpk">
                            <div id="lpk-autocomplete-list" class="autocomplete-items shadow-lg rounded"></div>
                        </div>

                        <!-- Pencarian Asesor Dinamis -->
                        <div class="relative">
                            <label class="block text-sm font-semibold text-gray-700">Cari Nama Asesor</label>
                            <input type="text" id="search-asesor" placeholder="Ketik nama asesor..." required autocomplete="off" class="mt-1 w-full rounded border border-gray-300 p-2 focus:outline-none focus:border-blue-500">
                            <div id="asesor-autocomplete-list" class="autocomplete-items shadow-lg rounded"></div>
                        </div>

                        <!-- Rentang Tanggal -->
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700">Tgl Mulai</label>
                                <input type="date" id="date-start" required class="mt-1 w-full rounded border border-gray-300 p-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700">Tgl Selesai</label>
                                <input type="date" id="date-end" required class="mt-1 w-full rounded border border-gray-300 p-2 text-sm focus:outline-none focus:border-blue-500">
                            </div>
                        </div>

                        <button type="submit" id="btn-save-schedule" class="w-full rounded bg-green-600 p-2.5 font-semibold text-white hover:bg-green-700 transition">Simpan Jadwal Tim</button>
                    </form>
                </div>

                <!-- 👑 KHUSUS ADMIN PUSAT: MENU MANAJEMEN AKUN PIC -->
                <div id="admin-management-section" class="hidden rounded-lg bg-white p-6 shadow border-t-4 border-amber-500">
                    <h3 class="text-lg font-bold border-b pb-2 mb-4 text-amber-700">👑 Manajemen Akun PIC (Khusus Admin)</h3>
                    <div id="pic-error" class="hidden mb-2 rounded bg-red-100 p-2 text-xs text-red-700"></div>
                    <div id="pic-success" class="hidden mb-2 rounded bg-green-100 p-2 text-xs text-green-700"></div>
                    
                    <form id="pic-form" class="space-y-3 text-sm">
                        <div>
                            <label class="block font-semibold text-gray-700">Username</label>
                            <input type="text" id="pic-username" placeholder="misal: pic.surabaya" required class="mt-1 w-full rounded border border-gray-300 p-1.5 focus:outline-none">
                        </div>
                        <div>
                            <label class="block font-semibold text-gray-700">Password</label>
                            <input type="text" id="pic-password" placeholder="Masukkan password" required class="mt-1 w-full rounded border border-gray-300 p-1.5 focus:outline-none">
                        </div>
                        <div>
                            <label class="block font-semibold text-gray-700">Nama Lengkap PIC</label>
                            <input type="text" id="pic-fullname" placeholder="Nama Lengkap Staff" required class="mt-1 w-full rounded border border-gray-300 p-1.5 focus:outline-none">
                        </div>
                        <div>
                            <label class="block font-semibold text-gray-700">Wilayah Tugas</label>
                            <input type="text" id="pic-region" placeholder="SURABAYA / JAKARTA / MEDAN" required class="mt-1 w-full rounded border border-gray-300 p-1.5 uppercase focus:outline-none">
                        </div>
                        <button type="submit" class="w-full rounded bg-amber-600 p-2 font-semibold text-white hover:bg-amber-700 transition">Buat / Update Akun PIC</button>
                    </form>

                    <!-- Daftar Akun PIC Saat Ini -->
                    <div class="mt-4">
                        <p class="font-bold text-xs text-gray-500 uppercase mb-2">Daftar Akun PIC Aktif</p>
                        <div id="pic-list-container" class="max-h-40 overflow-y-auto space-y-1.5 border p-2 bg-gray-50 rounded">
                            <!-- Data PIC dimuat dinamis -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- PANEL KANAN: MONITORING REAL-TIME & LOG TABEL (Akses Semua PIC) -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Log Tabel Transaksi -->
                <div class="rounded-lg bg-white p-6 shadow">
                    <h3 class="text-lg font-bold border-b pb-2 mb-4 text-slate-800">Daftar Distribusi Tugas Live (Database 3)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700 border-b">
                                    <th class="p-3">LPK / Laboratorium</th>
                                    <th class="p-3">Nama Asesor</th>
                                    <th class="p-3">Pelaksanaan</th>
                                    <th class="p-3">Oleh PIC</th>
                                </tr>
                            </thead>
                            <tbody id="table-jadwal-body" class="divide-y">
                                <!-- Data ditarik otomatis dari tabel jadwal_asesor -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- KODE ENGINE JAVASCRIPT & SUPABASE INTEGRATION -->
    <script>
        // --- KONFIGURASI API KEY SUPABASE ---
        const SUPABASE_URL = "https://ogubeyrmghsyzbzzohfo.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_LQwhRxZ76FA7cY3ePTJ0lg_upwsnUXC"; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // State Global Aplikasi
        let currentUser = null;

        // --- SISTEM AUTENTIKASI (LOGIN OPSI B) ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('login-username').value.trim();
            const passwordInput = document.getElementById('login-password').value;
            const btnLogin = document.getElementById('btn-login');
            const errorDiv = document.getElementById('login-error');

            btnLogin.disabled = true;
            btnLogin.innerText = "Memvalidasi...";
            errorDiv.classList.add('hidden');

            try {
                // Tembak langsung ke tabel master_pic live
                const { data, error } = await supabase
                    .from('master_pic')
                    .select('*')
                    .eq('username', usernameInput)
                    .eq('password', passwordInput)
                    .eq('status_aktif', true)
                    .single();

                if (error || !data) {
                    throw new Error("Username atau Password salah / Akun nonaktif.");
                }

                // Login Berhasil
                currentUser = data;
                initApp();

            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.classList.remove('hidden');
                btnLogin.disabled = false;
                btnLogin.innerText = "Masuk Sistem";
            }
        });

        function initApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-info-display').innerText = `PIC Berjalan: ${currentUser.nama_lengkap} | Role: ${currentUser.wilayah_tugas}`;

            // 👑 HAK AKSES ROLE: Tampilkan Menu Manajemen Akun HANYA jika wilayah_tugas = PUSAT
            if (currentUser.wilayah_tugas === 'PUSAT') {
                document.getElementById('admin-management-section').classList.remove('hidden');
                loadAllPIC(); // Muat daftar PIC khusus Admin
            } else {
                document.getElementById('admin-management-section').classList.add('hidden');
            }

            // Jalankan Fitur Autocomplete Pencarian & Muat Tabel Jadwal
            setupAutocompleteLPK();
            setupAutocompleteAsesor();
            loadLiveJadwal();
            listenRealtimeJadwal();
        }

        function logout() {
            currentUser = null;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('login-form').reset();
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-login').innerText = "Masuk Sistem";
        }

        // --- DIKENDALIKAN ADMIN: FITUR MANAJEMEN AKUN PIC (BUAT / UPDATE PASSWORD STAFF) ---
        document.getElementById('pic-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('pic-username').value.trim().toLowerCase();
            const password = document.getElementById('pic-password').value;
            const nama_lengkap = document.getElementById('pic-fullname').value;
            const wilayah_tugas = document.getElementById('pic-region').value.toUpperCase().trim();
            
            const errDiv = document.getElementById('pic-error');
            const succDiv = document.getElementById('pic-success');
            errDiv.classList.add('hidden');
            succDiv.classList.add('hidden');

            try {
                // Gunakan upsert: Jika username sudah ada, dia akan UPDATE password/data, jika belum ada akan INSERT baru
                const { error } = await supabase
                    .from('master_pic')
                    .upsert({ 
                        username: username, 
                        password: password, 
                        nama_lengkap: nama_lengkap, 
                        wilayah_tugas: wilayah_tugas,
                        status_aktif: true
                    }, { onConflict: 'username' });

                if (error) throw error;

                succDiv.innerText = `Akun PIC @${username} Berhasil Dibuat/Diperbarui!`;
                succDiv.classList.remove('hidden');
                document.getElementById('pic-form').reset();
                loadAllPIC(); // Refresh list

            } catch (err) {
                errDiv.innerText = "Gagal memproses akun: " + err.message;
                errDiv.classList.remove('hidden');
            }
        });

        async function loadAllPIC() {
            const container = document.getElementById('pic-list-container');
            const { data, error } = await supabase.from('master_pic').select('*').order('created_at', { ascending: false });
            
            if (error || !data) return;
            container.innerHTML = "";
            data.forEach(p => {
                const item = document.createElement('div');
                item.className = "text-xs p-1.5 bg-white border rounded flex justify-between items-center";
                item.innerHTML = `
                    <div>
                        <strong class="text-blue-800">@${p.username}</strong> (${p.wilayah_tugas})
                        <div class="text-gray-400">Pass: ${p.password}</div>
                    </div>
                    <span class="px-1.5 py-0.5 rounded text-[10px] bg-green-100 text-green-800 font-bold">Aktif</span>
                `;
                container.appendChild(item);
            });
        }


        // --- ENGINE PENCARIAN OTOMATIS (AUTOCOMPLETE TABEL MASTER LPK) ---
        function setupAutocompleteLPK() {
            const input = document.getElementById('search-lpk');
            const listContainer = document.getElementById('lpk-autocomplete-list');

            input.addEventListener('input', async function() {
                const val = this.value;
                listContainer.innerHTML = "";
                if (!val || val.length < 2) return;

                // Cari data langsung dari tabel master_lpk kolom NAMA LABORATORIUM
                const { data, error } = await supabase
                    .from('master_lpk')
                    .select('NO AKREDITASI, NAMA LABORATORIUM')
                    .ilike('NAMA LABORATORIUM', `%${val}%`)
                    .limit(7);

                if (error || !data) return;

                data.forEach(row => {
                    const b = document.createElement("div");
                    b.innerHTML = `<strong>${row['NO AKREDITASI'] || '-'}</strong> - ${row['NAMA LABORATORIUM']}`;
                    b.addEventListener("click", function() {
                        input.value = row['NAMA LABORATORIUM'];
                        document.getElementById('selected-no-lpk').value = row['NO AKREDITASI'];
                        document.getElementById('selected-nama-lpk').value = row['NAMA LABORATORIUM'];
                        listContainer.innerHTML = "";
                    });
                    listContainer.appendChild(b);
                });
            });
        }

        // --- ENGINE PENCARIAN OTOMATIS (AUTOCOMPLETE TABEL MASTER ASESOR) ---
        function setupAutocompleteAsesor() {
            const input = document.getElementById('search-asesor');
            const listContainer = document.getElementById('asesor-autocomplete-list');

            input.addEventListener('input', async function() {
                const val = this.value;
                listContainer.innerHTML = "";
                if (!val || val.length < 2) return;

                // Cari data langsung dari tabel master_asesor kolom NAMA
                const { data, error } = await supabase
                    .from('master_asesor')
                    .select('NAMA')
                    .ilike('NAMA', `%${val}%`)
                    .limit(7);

                if (error || !data) return;

                data.forEach(row => {
                    const b = document.createElement("div");
                    b.innerHTML = row['NAMA'];
                    b.addEventListener("click", function() {
                        input.value = row['NAMA'];
                        listContainer.innerHTML = "";
                    });
                    listContainer.appendChild(b);
                });
            });
        }

        // --- PROSES SIMPAN TRANSAKSI JADWAL (ANTI DOUBLE-CLICK UNTUK 100 USER) ---
        document.getElementById('schedule-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSave = document.getElementById('btn-save-schedule');
            
            // Kunci tombol biar tidak tertekan dua kali oleh user
            btnSave.disabled = true;
            btnSave.innerText = "Mengunci & Menyimpan...";

            const noLpk = document.getElementById('selected-no-lpk').value || "REG-UNKNOWN";
            const namaLpk = document.getElementById('selected-nama-lpk').value || document.getElementById('search-lpk').value;
            const namaAsesor = document.getElementById('search-asesor').value;
            const tglMulai = document.getElementById('date-start').value;
            const tglSelesai = document.getElementById('date-end').value;

            try {
                const { error } = await supabase
                    .from('jadwal_asesor')
                    .insert([{
                        no_lpk: noLpk,
                        nama_lpk: namaLpk,
                        nama_asesor: namaAsesor,
                        tanggal_mulai: tglMulai,
                        tanggal_selesai: tglSelesai,
                        created_by: currentUser.username // Mencatat otomatis siapa PIC yang input
                    }]);

                if (error) throw error;

                alert("Jadwal Berhasil Tersimpan Secara Live!");
                document.getElementById('schedule-form').reset();

            } catch (err) {
                alert("Gagal menyimpan jadwal: " + err.message);
            } finally {
                btnSave.disabled = false;
                btnSave.innerText = "Simpan Jadwal Tim";
            }
        });

        // --- MUAT DATA JADWAL & SYSTEM STREAMING REAL-TIME ---
        async function loadLiveJadwal() {
            const tbody = document.getElementById('table-jadwal-body');
            const { data, error } = await supabase
                .from('jadwal_asesor')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(50);

            if (error || !data) return;

            tbody.innerHTML = "";
            data.forEach(j => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition";
                row.innerHTML = `
                    <td class="p-3">
                        <div class="font-semibold text-slate-800">${j.nama_lpk}</div>
                        <div class="text-xs text-gray-400">No Akred: ${j.no_lpk}</div>
                    </td>
                    <td class="p-3 font-medium text-gray-700">${j.nama_asesor}</td>
                    <td class="p-3 text-xs">
                        <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded font-mono">${j.tanggal_mulai} s/d ${j.tanggal_selesai}</span>
                    </td>
                    <td class="p-3 text-xs text-gray-500 font-semibold">@${j.created_by}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Berlangganan Stream WebSocket Supabase (100 user sinkron tanpa reload)
        function listenRealtimeJadwal() {
            supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'jadwal_asesor' }, (payload) => {
                    loadLiveJadwal(); // Ambil ulang data otomatis jika ada PIC lain yang klik simpan
                })
                .subscribe();
        }

        // Menutup autocomplete jika mengklik luar layar
        document.addEventListener("click", function (e) {
            if (e.target.id !== 'search-lpk') document.getElementById('lpk-autocomplete-list').innerHTML = "";
            if (e.target.id !== 'search-asesor') document.getElementById('asesor-autocomplete-list').innerHTML = "";
        });
    </script>
</body>
</html>
